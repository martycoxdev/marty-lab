<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>marty-lab</title>
    <script>
      // GitHub Pages SPA redirect: encodes the current path into a query param
      // and bounces to the root so index.html can restore it via spa-redirect.js.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
